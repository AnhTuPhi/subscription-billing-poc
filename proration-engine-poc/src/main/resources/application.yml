server:
  port: 8081

spring:
  application:
    name: proration-engine-poc
  datasource:
    url: jdbc:h2:mem:proration;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate.format_sql: true
  h2:
    console:
      enabled: true
      path: /h2
